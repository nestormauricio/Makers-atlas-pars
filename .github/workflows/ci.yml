name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build-test:
    name: Build + Test + Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test + cobertura
        run: >
          dotnet test --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "trx;LogFileName=test-results.trx"

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            coverage/**
            **/*.trx

      - name: Verificar cobertura mínima 70% en AtlasPars.Domain (lógica del evaluador)
        run: |
          python3 - <<'PY'
          import glob, sys, xml.etree.ElementTree as ET

          files = glob.glob("coverage/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("::error::No se encontró ningún reporte de cobertura"); sys.exit(1)

          target_fragment = "AtlasPars.Domain"
          covered = 0
          total = 0
          found_any = False

          for f in files:
              tree = ET.parse(f)
              for cls in tree.getroot().iter("class"):
                  filename = cls.attrib.get("filename", "")
                  if target_fragment not in filename:
                      continue
                  found_any = True
                  for line in cls.iter("line"):
                      total += 1
                      if int(line.attrib.get("hits", "0")) > 0:
                          covered += 1

          if not found_any:
              print(f"::error::No se encontraron clases de '{target_fragment}' en el reporte de cobertura")
              sys.exit(1)

          rate = (covered / total * 100) if total else 0
          print(f"Cobertura de línea de {target_fragment}: {rate:.1f}% ({covered}/{total} líneas)")

          if rate < 70:
              print(f"::error::Cobertura de {target_fragment} ({rate:.1f}%) por debajo del umbral obligatorio de 70%")
              sys.exit(1)
          PY

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/csharp

  sca:
    name: SCA - dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "atlas-pars"
          path: "."
          format: "SARIF"
          args: >
            --suppression dependency-check-suppression.xml
      - name: Subir resultados a code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/dependency-check-report.sarif

  docker-scan:
    name: Escaneo de imagen Docker (Trivy)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v7
      - name: Build imagen
        run: docker build -f deploy/Dockerfile -t atlas-pars-api:ci .

      # Gate real del pipeline: formato tabla, confirmado estable (ver CI #42, 0 vulnerabilidades
      # CRITICAL/HIGH en los 4 targets escaneados). Este es el que bloquea el merge.
      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: atlas-pars-api:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      # Reporte para la pestaña de Security de GitHub: mismo escaneo en SARIF, pero best-effort.
      # El formato sarif de Trivy tiene un bug conocido con proyectos .NET multi-root
      # ("Multiple root projects found in .deps.json") que hace fallar la generación del SARIF
      # incluso con 0 vulnerabilidades reales (confirmado: el gate de arriba, mismo escaneo en
      # tabla, pasa limpio). continue-on-error evita que ese bug de tooling tumbe el pipeline;
      # el gate de seguridad real ya se hizo en el step anterior.
      - name: Trivy scan (SARIF para Security tab, best-effort)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: atlas-pars-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
      - name: Subir resultados
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  iac-scan:
    name: IaC scanning (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: infra
          sarif_file: tfsec.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: tfsec.sarif

  semver:
    name: Versionado semántico
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build-test, sast, sca, docker-scan, iac-scan]
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Tag semántico automático
        uses: googleapis/release-please-action@v5
        with:
          release-type: simple
